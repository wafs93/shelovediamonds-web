<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — SheLoveDiamonds</title>
  <link rel="stylesheet" href="./css/style.css?v=20260707" />
  <style>
    .checkout-page {
      padding: 100px var(--section-pad) 80px;
      background: var(--cream);
      min-height: calc(100vh - 220px);
    }

    .checkout-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 48px;
      align-items: start;
    }

    .checkout-card {
      background: var(--white);
      border: 1px solid var(--border-soft);
      padding: 32px;
    }

    .checkout-card__title {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      color: var(--charcoal);
      margin-bottom: 24px;
    }

    .checkout-form {
      display: grid;
      gap: 16px;
    }

    .checkout-form__row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .checkout-form label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .checkout-form input,
    .checkout-form textarea,
    .checkout-form select {
      padding: 14px 16px;
      border: 1px solid var(--border-soft);
      background: var(--cream);
      color: var(--charcoal);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      outline: none;
    }

    .checkout-form input:focus,
    .checkout-form textarea:focus,
    .checkout-form select:focus {
      border-color: var(--gold);
    }

    .checkout-payments {
      margin-top: 24px;
      display: grid;
      gap: 12px;
    }

    .payment-option {
      border: 1px solid var(--border-soft);
      padding: 16px 18px;
      color: var(--text-mid);
      font-size: 0.85rem;
      background: var(--cream);
    }

    .shipping-options {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }

    .shipping-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border: 1px solid var(--border-soft);
      padding: 14px 16px;
      background: var(--cream);
      cursor: pointer;
    }

    .shipping-option input {
      margin-top: 3px;
      accent-color: var(--gold);
    }

    .shipping-option__content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .shipping-option__title {
      font-size: 0.86rem;
      color: var(--charcoal);
    }

    .shipping-option__meta {
      font-size: 0.76rem;
      color: var(--text-mid);
      letter-spacing: 0.03em;
    }

    .shipping-option.active {
      border-color: var(--gold);
      background: #f7efe0;
    }

    .btn-pay-card {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px;
      background: var(--gold);
      color: var(--charcoal);
      border: none;
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.25s ease;
    }

    .btn-pay-card:hover {
      background: #c79b43;
    }

    .checkout-summary {
      position: sticky;
      top: calc(var(--nav-height) + 24px);
      display: grid;
      gap: 16px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-soft);
      font-size: 0.86rem;
      color: var(--text-mid);
    }

    .summary-item strong {
      color: var(--charcoal);
    }

    .checkout-note {
      padding: 16px 18px;
      background: var(--cream);
      border: 1px solid var(--border-soft);
      color: var(--text-mid);
      line-height: 1.7;
      font-size: 0.85rem;
    }

    .checkout-note a {
      color: var(--charcoal);
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .checkout-grid {
        grid-template-columns: 1fr;
      }
      .checkout-summary {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .checkout-form__row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <section class="checkout-page">
    <div class="checkout-grid">
      <div class="checkout-card">
        <h1 class="checkout-card__title">Billing Details</h1>
        <form class="checkout-form" id="checkout-form">
          <div class="checkout-form__row">
            <label>
              First name
              <input type="text" id="firstName" placeholder="First name" required />
            </label>
            <label>
              Last name
              <input type="text" id="lastName" placeholder="Last name" required />
            </label>
          </div>
          <div class="checkout-form__row">
            <label>
              Email
              <input type="email" id="email" placeholder="you@example.com" required />
            </label>
            <label>
              Phone
              <input type="tel" id="phone" placeholder="+44 7000 000000" required />
            </label>
          </div>
          <label>
            Address line 1
            <input type="text" id="address1" placeholder="House number and street" required />
          </label>
          <label>
            Address line 2 (optional)
            <input type="text" id="address2" placeholder="Apartment, suite, unit" />
          </label>
          <div class="checkout-form__row">
            <label>
              City
              <input type="text" id="city" placeholder="City" required />
            </label>
            <label>
              Postcode
              <input type="text" id="postcode" placeholder="Postcode" required />
            </label>
          </div>
          <label>
            Country
            <select id="country">
              <option value="United Kingdom" selected>United Kingdom</option>
              <option value="United States">United States</option>
              <option value="Canada">Canada</option>
              <option value="Ireland">Ireland</option>
            </select>
          </label>

          <div class="checkout-card__title" style="margin-top:12px; margin-bottom: 12px;">Shipping</div>
          <div class="shipping-options" role="radiogroup" aria-label="Shipping options">
            <label class="shipping-option active">
              <input type="radio" name="shippingMethod" value="standard" checked />
              <span class="shipping-option__content">
                <span class="shipping-option__title">Standard shipping (3-5 days)</span>
                <span class="shipping-option__meta">Free</span>
              </span>
            </label>
            <label class="shipping-option">
              <input type="radio" name="shippingMethod" value="express" />
              <span class="shipping-option__content">
                <span class="shipping-option__title">Express shipping (1-3 days)</span>
                <span class="shipping-option__meta">£4.99</span>
              </span>
            </label>
            <label class="shipping-option">
              <input type="radio" name="shippingMethod" value="same-day" />
              <span class="shipping-option__content">
                <span class="shipping-option__title">Same Day Delivery (London only)</span>
                <span class="shipping-option__meta">£15.99</span>
              </span>
            </label>
            <label class="shipping-option">
              <input type="radio" name="shippingMethod" value="international" />
              <span class="shipping-option__content">
                <span class="shipping-option__title">International shipping</span>
                <span class="shipping-option__meta">Contact us</span>
              </span>
            </label>
          </div>

          <div class="checkout-card__title" style="margin-top:12px; margin-bottom: 12px;">Payment</div>
          <div class="checkout-payments">
            <button class="btn-pay-card" id="pay-card-btn" type="button">Pay by Card</button>
            <div class="payment-option">Secure card payment via Stripe. You will be redirected to complete payment.</div>
          </div>

          <button class="btn btn-dark" type="submit" style="margin-top:8px; justify-content:center">Place Order</button>
        </form>
      </div>

      <div class="checkout-summary">
        <div class="checkout-card">
          <h2 class="checkout-card__title">Order Summary</h2>
          <div id="checkout-items"></div>
          <div class="summary-item" style="margin-top:16px">
            <span>Subtotal</span>
            <strong id="checkout-subtotal">£0</strong>
          </div>
          <div class="summary-item">
            <span>Shipping</span>
            <strong id="shipping-value" style="color:var(--gold)">Free</strong>
          </div>
          <div class="summary-item" style="font-family:var(--font-serif); font-size:1.02rem; color:var(--charcoal)">
            <span>Total</span>
            <strong id="checkout-total">£0</strong>
          </div>
        </div>

        <div class="checkout-note">
          Payment coming soon — contact us via WhatsApp to complete your order.
          <br />
          <a href="https://wa.me/447438451109" target="_blank" rel="noreferrer">Chat on WhatsApp</a>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="./js/products.js?v=20260707"></script>
  <script src="./js/nav.js?v=20260707"></script>
  <script src="./js/cart.js?v=20260707"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      injectNav('checkout');
      injectFooter();

      const cart = getCart();
      const container = document.getElementById('checkout-items');
      const subtotalEl = document.getElementById('checkout-subtotal');
      const totalEl = document.getElementById('checkout-total');
      const shippingValueEl = document.getElementById('shipping-value');
      const shippingInputs = Array.from(document.querySelectorAll('input[name="shippingMethod"]'));
      const shippingRates = {
        standard: 0,
        express: 4.99,
        'same-day': 15.99,
        international: null
      };

      function updateCheckoutSummary() {
        if (!cart.length) {
          container.innerHTML = '<div class="summary-item"><span>Your bag is empty</span><strong>—</strong></div>';
          subtotalEl.textContent = formatPrice(0);
          shippingValueEl.textContent = 'Free';
          totalEl.textContent = formatPrice(0);
          return;
        }

        const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        container.innerHTML = cart.map(item => `
          <div class="summary-item">
            <span>${item.name} × ${item.quantity}</span>
            <strong>${formatPrice(item.price * item.quantity)}</strong>
          </div>
        `).join('');
        subtotalEl.textContent = formatPrice(subtotal);

        const selectedShipping = document.querySelector('input[name="shippingMethod"]:checked');
        const selectedRate = selectedShipping ? shippingRates[selectedShipping.value] : shippingRates.standard;
        const shippingCost = selectedRate === null ? null : Number(selectedRate);
        const shippingLabel = selectedRate === null ? 'Contact us' : selectedRate === 0 ? 'Free' : formatPrice(selectedRate);
        shippingValueEl.textContent = shippingLabel;
        shippingValueEl.style.color = selectedRate === 0 ? 'var(--gold)' : 'var(--charcoal)';
        totalEl.textContent = formatPrice(subtotal + (shippingCost || 0));
      }

      updateCheckoutSummary();
      shippingInputs.forEach(input => {
        input.addEventListener('change', function() {
          document.querySelectorAll('.shipping-option').forEach(option => option.classList.remove('active'));
          input.closest('.shipping-option').classList.add('active');
          updateCheckoutSummary();
        });
      });

      const payCardBtn = document.getElementById('pay-card-btn');
      payCardBtn.addEventListener('click', () => {
        const cartItems = getCart();
        if (!cartItems.length) {
          alert('Your bag is empty.');
          return;
        }

        const productLinks = cartItems.map(item => {
          const product = SLD_PRODUCTS.find(p => p.id === item.id);
          return product ? product.stripeLink : null;
        }).filter(Boolean);

        const selectedLink = productLinks.length === 1
          ? productLinks[0]
          : productLinks.reduce((highest, current) => {
              const highestProduct = SLD_PRODUCTS.find(p => p.stripeLink === highest);
              const currentProduct = SLD_PRODUCTS.find(p => p.stripeLink === current);
              return (highestProduct && currentProduct && currentProduct.price > highestProduct.price) ? current : highest;
            }, productLinks[0]);

        if (selectedLink) {
          window.open(selectedLink, '_blank', 'noopener,noreferrer');
        } else {
          alert('Stripe payment is not available for this item yet.');
        }
      });

      document.getElementById('checkout-form').addEventListener('submit', (event) => {
        event.preventDefault();

        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const address1 = document.getElementById('address1').value.trim();
        const address2 = document.getElementById('address2').value.trim();
        const city = document.getElementById('city').value.trim();
        const postcode = document.getElementById('postcode').value.trim();
        const country = document.getElementById('country').value;

        if (!firstName || !lastName || !email || !phone || !address1 || !city || !postcode) {
          alert('Please fill in all required fields before placing your order.');
          return;
        }

        const name = `${firstName} ${lastName}`;
        const address = [address1, address2, `${city}, ${postcode}`, country].filter(Boolean).join(', ');
        const cartItems = getCart();
        const subtotal = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const selectedShipping = document.querySelector('input[name="shippingMethod"]:checked');
        const selectedRate = selectedShipping ? shippingRates[selectedShipping.value] : shippingRates.standard;
        const shippingCost = selectedRate === null ? null : Number(selectedRate);
        const shippingLabel = selectedRate === null ? 'Contact us' : selectedRate === 0 ? 'Free' : formatPrice(selectedRate);
        const total = subtotal + (shippingCost || 0);

        const itemList = cartItems.map(item => `${item.name} (${item.variant}) x${item.quantity}`).join('\n');
        const message = `🛍️ New Order from SheLoveDiamonds\n\nName: ${name}\nEmail: ${email}\nPhone: ${phone}\nAddress: ${address}\n\nItems:\n${itemList || 'No items selected'}\n\nShipping: ${shippingLabel}\nTotal: ${formatPrice(total)}\n\nPlease confirm and send payment details. Thank you!`;

        const encodedMessage = encodeURIComponent(message);
        window.open(`https://wa.me/447438451109?text=${encodedMessage}`, '_blank', 'noopener,noreferrer');
      });
    });
  </script>
</body>
</html>
